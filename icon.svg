<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe44d"/>
      <stop offset="100%" stop-color="#e6b800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Cost gem -->
  <polygon points="256,80 380,200 380,360 256,440 132,360 132,200" fill="url(#gold)" filter="url(#glow)" stroke="#b8960c" stroke-width="2"/>
  <!-- Inner shine -->
  <polygon points="256,110 355,210 355,340 256,400 157,340 157,210" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Number 1 -->
  <text x="256" y="310" font-size="160" font-weight="900" text-anchor="middle" fill="#0a0a14" font-family="sans-serif">1</text>
  <!-- P1/P2 indicators -->
  <circle cx="150" cy="150" r="24" fill="#3498db" opacity="0.8"/>
  <text x="150" y="158" font-size="22" font-weight="800" text-anchor="middle" fill="#fff" font-family="sans-serif">P1</text>
  <circle cx="362" cy="362" r="24" fill="#e74c3c" opacity="0.8"/>
  <text x="362" y="370" font-size="22" font-weight="800" text-anchor="middle" fill="#fff" font-family="sans-serif">P2</text>
</svg>
